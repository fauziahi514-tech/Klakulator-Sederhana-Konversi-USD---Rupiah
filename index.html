<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Kurs Real-Time</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="box">
        <h2>Konversi Mata Uang</h2>
        <p class="subtitle">Kurs Real-Time: 1 USD = <b>Rp {{ kurs }}</b></p>
        
        <form method="POST">
            <input type="number" name="usd" step="any" placeholder="Jumlah Dollar (USD)" required>
            <button type="submit">Hitung Sekarang</button>
        </form>

        {% if hasil %}
        <div class="hasil">
            <p>Hasil Konversi:</p>
            <h1>Rp {{ hasil }}</h1>
        </div>
        {% endif %}
    </div>
</body>
</html>
